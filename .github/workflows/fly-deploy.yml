# Auto-deploy to Fly.io on every push to main (and on manual dispatch).
#
# Reads the root fly.toml (app = personalavatar). Requires one repo secret:
#   FLY_API_TOKEN  — create a deploy token in the Fly dashboard
#                    (Account/Org -> Tokens, or `fly tokens create deploy -a personalavatar`)
#                    then add it under GitHub repo -> Settings -> Secrets and
#                    variables -> Actions -> New repository secret.
#
# The build runs on Fly's remote builders (--remote-only), so the runner needs no
# Docker. --ha=false keeps a single machine (matches min_machines_running = 1).
name: Fly Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}        # lets you trigger a deploy manually from the Actions tab

jobs:
  deploy:
    name: Deploy app to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-group   # never run two deploys at once
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
